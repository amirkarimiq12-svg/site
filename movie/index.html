
<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="description" content="DEMON MOVIES | دانلود فیلم و سریال"><title>DEMON | فیلم و سریال</title><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg-start:#0f0c29;--bg-mid:#1a1a3e;--bg-end:#24243e;--card-bg:rgba(30,30,60,0.75);--card-bg-hover:rgba(40,40,75,0.92);--text-primary:#f0f0ff;--text-secondary:#b8b8e0;--border-color:rgba(139,92,246,0.4);--border-hover:#8b5cf6;--btn-bg:rgba(139,92,246,0.15);--btn-hover:#8b5cf6;--btn-text:#f0f0ff;--btn-text-hover:#fff;--logo-gradient:linear-gradient(135deg,#c084fc,#8b5cf6,#a855f7);--tagline-bg:rgba(139,92,246,0.12);--shadow:rgba(0,0,0,0.4);--scrollbar-track:#1a1a3e;--scrollbar-thumb:#8b5cf6;--accent:#8b5cf6;--accent-glow:#c084fc;--input-bg:rgba(0,0,0,0.4)}body.light{--bg-start:#f0f4ff;--bg-mid:#e0e8ff;--bg-end:#d0dcff;--card-bg:rgba(255,255,255,0.88);--card-bg-hover:#fff;--text-primary:#1a1a2e;--text-secondary:#4a4a6a;--border-color:rgba(139,92,246,0.3);--border-hover:#8b5cf6;--btn-bg:rgba(139,92,246,0.1);--btn-hover:#8b5cf6;--btn-text:#1a1a2e;--btn-text-hover:#fff;--logo-gradient:linear-gradient(135deg,#8b5cf6,#7c3aed,#6d28d9);--tagline-bg:rgba(139,92,246,0.08);--shadow:rgba(0,0,0,0.08);--scrollbar-track:#c7d2fe;--scrollbar-thumb:#8b5cf6;--accent:#8b5cf6;--accent-glow:#a855f7;--input-bg:rgba(0,0,0,0.05)}body{background:linear-gradient(135deg,var(--bg-start),var(--bg-mid),var(--bg-end));font-family:'Vazirmatn','Segoe UI',Tahoma,'Vazir',system-ui,sans-serif;color:var(--text-primary);min-height:100vh;padding:0 0 2rem}.container{max-width:1400px;margin:0 auto;padding:1.5rem 1.5rem 2rem}.home-btn{position:fixed;top:1rem;right:1rem;z-index:1100;background:rgba(30,30,60,.85);backdrop-filter:blur(12px);border:1px solid var(--border-color);border-radius:60px;padding:.6rem 1.3rem;font-size:1rem;font-weight:600;text-decoration:none;color:var(--text-primary);display:flex;align-items:center;gap:.5rem;transition:.25s;box-shadow:0 5px 14px var(--shadow)}.home-btn:hover{background:var(--btn-hover);color:#fff;border-color:var(--border-hover);transform:scale(1.02)}@media (max-width:550px){.home-btn{padding:.45rem .9rem;top:.8rem;right:.8rem}.home-text{display:none}.home-icon{font-size:1.4rem}}.theme-toggle{position:fixed;top:1rem;left:1rem;z-index:1100;background:rgba(30,30,60,.85);backdrop-filter:blur(12px);border:1px solid var(--border-color);border-radius:60px;padding:.45rem 1rem;cursor:pointer;display:flex;align-items:center;gap:.5rem;transition:.25s;font-size:.9rem}.theme-toggle:hover{border-color:var(--border-hover);transform:translateY(-2px)}.theme-text{font-size:.7rem;font-weight:500}.hero{text-align:center;margin-bottom:1.5rem}.logo{font-size:2.5rem;font-weight:900;background:var(--logo-gradient);background-clip:text;-webkit-background-clip:text;color:transparent;letter-spacing:2px}.tagline{font-size:.8rem;color:var(--text-secondary);background:var(--tagline-bg);display:inline-block;padding:.2rem 1.2rem;border-radius:40px;margin-top:.3rem;border:1px solid var(--border-color)}.stats-bar{display:flex;justify-content:center;gap:1rem;margin-bottom:1.5rem;font-size:.7rem}.stats-bar span{background:rgba(0,0,0,.3);padding:.2rem .8rem;border-radius:20px;border:1px solid var(--border-color)}.search-section{background:var(--card-bg);backdrop-filter:blur(12px);border-radius:3rem;padding:1rem 1.2rem;margin-bottom:1.5rem;border:1px solid var(--border-color);display:flex;justify-content:center;flex-wrap:wrap;gap:.8rem;position:sticky;top:0;z-index:100}.search-box{flex:1;max-width:400px;position:relative}#searchInput{width:100%;padding:.7rem 1.2rem;font-size:.9rem;background:var(--input-bg);border:1px solid var(--border-color);border-radius:60px;color:var(--text-primary);outline:none;font-family:inherit}#searchInput:focus{border-color:var(--accent);box-shadow:0 0 8px var(--accent)}.result-info{background:rgba(0,0,0,.3);padding:.4rem 1rem;border-radius:40px;font-size:.8rem;display:flex;align-items:center;gap:.5rem;border:1px solid var(--border-color)}.result-count-badge{background:var(--accent);color:#fff;padding:.15rem .6rem;border-radius:30px;font-weight:700}.movies-container{position:relative}.movies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.2rem}.movie-card{background:var(--card-bg);backdrop-filter:blur(12px);border-radius:1.5rem;border:1px solid var(--border-color);overflow:hidden;transition:all .25s ease;box-shadow:0 8px 20px var(--shadow)}.movie-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 30px var(--shadow)}.card-header{padding:.8rem 1rem .6rem;border-bottom:1px solid var(--border-color)}.movie-title{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:baseline;gap:.3rem;margin-bottom:.3rem}.en-title{font-size:1rem;font-weight:800;color:var(--accent-glow)}.fa-title{font-size:.65rem;background:rgba(139,92,246,.15);padding:.15rem .6rem;border-radius:20px;color:var(--text-secondary)}.movie-meta{display:flex;flex-wrap:wrap;gap:.5rem;font-size:.6rem;color:var(--text-secondary)}.movie-meta span{background:rgba(0,0,0,.3);padding:.15rem .5rem;border-radius:20px}.badge-series{background:#ff3366!important;color:#fff!important}.badge-movie{background:var(--accent)!important;color:#fff!important}.downloads-section{padding:.6rem .8rem .8rem;max-height:220px;overflow-y:auto;font-size:.65rem}.downloads-section::-webkit-scrollbar{width:4px}.downloads-section::-webkit-scrollbar-track{background:rgba(0,0,0,.2);border-radius:5px}.downloads-section::-webkit-scrollbar-thumb{background:var(--accent);border-radius:5px}.version-group{margin-bottom:.5rem;background:rgba(0,0,0,.3);border-radius:.8rem;padding:.4rem;border:1px solid var(--border-color)}.version-title{font-weight:800;font-size:.65rem;margin-bottom:.3rem;background:rgba(139,92,246,.2);display:inline-block;padding:.1rem .6rem;border-radius:20px;color:var(--accent-glow)}.quality-item{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:.3rem;font-size:.6rem;padding:.3rem;margin-bottom:.2rem;background:rgba(0,0,0,.2);border-radius:.5rem}.download-link,.folder-link{background:linear-gradient(135deg,var(--accent),var(--accent-glow));padding:.2rem .7rem;border-radius:30px;text-decoration:none;color:#fff;font-size:.6rem;font-weight:700;transition:.2s}.download-link:hover,.folder-link:hover{opacity:.85;transform:translateY(-1px)}.no-links{color:var(--text-secondary);font-size:.6rem;text-align:center;padding:.3rem}.loading,.empty-state{text-align:center;padding:2rem;background:var(--card-bg);border-radius:1.5rem;border:1px solid var(--border-color)}.pagination{display:flex;justify-content:center;gap:.5rem;margin-top:2rem;flex-wrap:wrap}.page-btn{background:var(--card-bg);border:1px solid var(--border-color);color:var(--text-primary);padding:.4rem .8rem;border-radius:30px;cursor:pointer;font-size:.8rem;transition:.2s}.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}.page-btn:hover:not(.active){background:rgba(139,92,246,.2);border-color:var(--accent)}footer{text-align:center;font-size:.6rem;color:var(--text-secondary);margin-top:2rem;padding-top:.8rem;border-top:1px solid var(--border-color)}@media (max-width:700px){.container{padding:1rem}.movies-grid{grid-template-columns:1fr}.logo{font-size:1.8rem}.search-section{flex-direction:column;align-items:center;position:relative}}</style></head><body><a href="../index.html" class="home-btn"><span class="home-icon">🏠</span><span class="home-text">خانه</span></a><div class="theme-toggle" id="themeToggle"><span id="themeIcon">🌙</span><span class="theme-text" id="themeText">دارک مود</span></div><div class="container"><div class="hero"><div class="logo">DEMON MOVIES</div><div class="tagline">🎬 دانلود فیلم و سریال | بیش از ۱۴۰۰۰ عنوان 🎬</div></div><div class="stats-bar" id="statsBar"><span>📀 در حال بارگذاری...</span></div><div class="search-section"><div class="search-box"><input type="text" id="searchInput" placeholder="جستجو... (عنوان انگلیسی یا فارسی)" autocomplete="off"></div><div class="result-info"><span>🎯 نتایج</span><span id="resultCount" class="result-count-badge">0</span></div></div><div id="moviesContainer" class="movies-container"><div class="loading">⏳ در حال بارگذاری دیتابیس (۱۴۰۰۰+ عنوان)...</div></div><div id="pagination" class="pagination"></div><footer><p>🔥 تمام لینک‌ها مستقیم | سریال‌ها به صورت فولدر فصل 🔥</p><p>💀 DEMON TEAM | به‌روزرسانی مداوم 💀</p></footer></div><script>(function(){const ITEMS_PER_PAGE=20;let movieDatabase=[];let currentFiltered=[];let currentPage=1;let searchTimeout=null;const container=document.getElementById('moviesContainer');const paginationDiv=document.getElementById('pagination');const searchInput=document.getElementById('searchInput');const resultCountSpan=document.getElementById('resultCount');const statsBar=document.getElementById('statsBar');function formatNumber(num){if(num>=1000000)return(num/1000000).toFixed(1)+'M';if(num>=1000)return(num/1000).toFixed(1)+'K';return num?num.toString():'0'}function escapeHtml(str){if(!str)return '';return String(str).replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m})}function buildDownloadHTML(linksObject,isSeries){if(!linksObject||typeof linksObject!=='object'){return'<div class="no-links">🚫 لینکی موجود نیست</div>'}if(isSeries){let versions=Object.keys(linksObject);if(!versions.length)return'<div class="no-links">📺 لینک سریال یافت نشد</div>';let result='';for(let ver of versions.slice(0,2)){const seasonsObj=linksObject[ver];if(!seasonsObj||typeof seasonsObj!=='object')continue;result+='<div class="version-group"><div class="version-title">🎧 '+escapeHtml(ver)+'</div>';let seasonNumbers=Object.keys(seasonsObj).slice(0,3);for(let sn of seasonNumbers){const qualities=seasonsObj[sn];if(!Array.isArray(qualities)||!qualities.length)continue;const q=qualities[0];const folderUrl=q?.folder;if(folderUrl){result+='<div class="quality-item"><span class="badge-quality">'+escapeHtml(q.quality||'HD')+'</span><a href="'+folderUrl+'" class="folder-link" target="_blank">📁 فصل '+sn+'</a></div>'}}result+='</div>';if(result.length>800)break}return result||'<div class="no-links">⚠️ جزئیات موجود نیست</div>'}let groups=[];for(let key of Object.keys(linksObject)){const items=linksObject[key];if(Array.isArray(items)&&items.length){const version=items[0]?.version||(key==='1'?'SoftSub':'Dubbed');groups.push({version,items:items.slice(0,2)})}}if(!groups.length)return'<div class="no-links">🎬 لینک دانلود موجود نیست</div>';let html='';for(let g of groups.slice(0,2)){html+='<div class="version-group"><div class="version-title">🎧 '+escapeHtml(g.version)+'</div>';for(let q of g.items){const fileUrl=q.file;if(fileUrl&&fileUrl.startsWith('http')){html+='<div class="quality-item"><span class="badge-quality">'+escapeHtml(q.quality||'HD')+'</span><a href="'+fileUrl+'" class="download-link" target="_blank">⬇️ دانلود</a></div>'}}html+='</div>'}return html}function createMovieCard(movie){const type=movie[1]||'movie';const titleEn=movie[2]||'نامشخص';const titleFa=movie[3]||'—';const year=movie[4]||'?';const rating=movie[5]?parseFloat(movie[5]).toFixed(1):'0';const votes=movie[6]?formatNumber(movie[6]):'0';const linksObject=movie[7]&&typeof movie[7]==='object'?movie[7]:{};const isSeries=(type==='series');const downloadsHtml=buildDownloadHTML(linksObject,isSeries);const typeBadgeClass=isSeries?'badge-series':'badge-movie';const typeText=isSeries?'📺 سریال':'🎬 فیلم';return'<div class="movie-card"><div class="card-header"><div class="movie-title"><span class="en-title">'+escapeHtml(titleEn)+'</span><span class="fa-title">'+escapeHtml(titleFa)+'</span></div><div class="movie-meta"><span>📅 '+escapeHtml(year)+'</span><span>⭐ '+rating+'</span><span class="'+typeBadgeClass+'">'+typeText+'</span><span>👥 '+votes+'</span></div></div><div class="downloads-section">'+downloadsHtml+'</div></div>'}function renderCurrentPage(){const start=(currentPage-1)*ITEMS_PER_PAGE;const end=start+ITEMS_PER_PAGE;const pageItems=currentFiltered.slice(start,end);if(!pageItems.length){container.innerHTML='<div class="empty-state">📭 نتیجه‌ای یافت نشد</div>';paginationDiv.innerHTML='';return}let html='<div class="movies-grid">';for(let item of pageItems){html+=createMovieCard(item)}html+='</div>';container.innerHTML=html;renderPagination()}function renderPagination(){const totalPages=Math.ceil(currentFiltered.length/ITEMS_PER_PAGE);if(totalPages<=1){paginationDiv.innerHTML='';return}let pagesHtml='';const maxVisible=7;let startPage=Math.max(1,currentPage-Math.floor(maxVisible/2));let endPage=Math.min(totalPages,startPage+maxVisible-1);if(endPage-startPage<maxVisible-1){startPage=Math.max(1,endPage-maxVisible+1)}if(startPage>1){pagesHtml+=`<button class="page-btn" data-page="1">۱</button>`;if(startPage>2)pagesHtml+=`<span style="padding:0 0.3rem;">...</span>`}for(let i=startPage;i<=endPage;i++){pagesHtml+=`<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`}if(endPage<totalPages){if(endPage<totalPages-1)pagesHtml+=`<span style="padding:0 0.3rem;">...</span>`;pagesHtml+=`<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`}paginationDiv.innerHTML=pagesHtml;document.querySelectorAll('.page-btn').forEach(btn=>{btn.addEventListener('click',()=>{const page=parseInt(btn.dataset.page);if(page&&page!==currentPage){currentPage=page;renderCurrentPage();window.scrollTo({top:0,behavior:'smooth'})}})})}function performSearch(query){if(searchTimeout)clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>{const trimmed=query.trim().toLowerCase();if(!trimmed){currentFiltered=[...movieDatabase];resultCountSpan.innerText=formatNumber(currentFiltered.length)}else{currentFiltered=movieDatabase.filter(movie=>{const en=(movie[2]||'').toLowerCase();const fa=(movie[3]||'').toLowerCase();return en.includes(trimmed)||fa.includes(trimmed)});resultCountSpan.innerText=formatNumber(currentFiltered.length)}currentPage=1;renderCurrentPage()},200)}function loadDatabase(){if(typeof data!=='undefined'&&Array.isArray(data)){movieDatabase=data.filter(item=>Array.isArray(item)&&item.length>=5&&typeof item[2]==='string');currentFiltered=[...movieDatabase];const total=movieDatabase.length;statsBar.innerHTML=`<span>🎬 فیلم: ${formatNumber(total)}</span>`;resultCountSpan.innerText=formatNumber(total);renderCurrentPage()}else{container.innerHTML='<div class="empty-state">❌ فایل دیتابیس یافت نشد<br><span style="font-size:0.7rem;">لطفاً فایل 1.js را در همان پوشه قرار دهید</span></div>';statsBar.innerHTML='<span>❌ خطا در بارگذاری</span>'}}document.addEventListener('DOMContentLoaded',()=>{loadDatabase();if(searchInput){searchInput.addEventListener('input',(e)=>performSearch(e.target.value))}});})();</script><script src="1.js"></script><script>const themeToggle=document.getElementById('themeToggle');const themeIcon=document.getElementById('themeIcon');const themeText=document.getElementById('themeText');let savedTheme=localStorage.getItem('demonTheme');if(savedTheme==='light'){document.body.classList.add('light');themeIcon.textContent='☀️';themeText.textContent='لایت مود'}else{document.body.classList.remove('light');themeIcon.textContent='🌙';themeText.textContent='دارک مود'}themeToggle.addEventListener('click',()=>{document.body.classList.toggle('light');const isLight=document.body.classList.contains('light');if(isLight){localStorage.setItem('demonTheme','light');themeIcon.textContent='☀️';themeText.textContent='لایت مود'}else{localStorage.setItem('demonTheme','dark');themeIcon.textContent='🌙';themeText.textContent='دارک مود'}});</script></body></html>
